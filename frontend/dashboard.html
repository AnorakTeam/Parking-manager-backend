<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ParkManager - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="app">
    <header>
        <div class="brand">
            <span class="brand-icon">🅿</span>
            <div>
                <h1>ParkManager</h1>
                <span>Sistema de gestión de estacionamientos</span>
            </div>
        </div>
        <div class="user-badge">
            <div class="avatar" id="avatar"></div>
            <div class="user-info">
                <small>Sesión activa</small>
                <strong id="username-display"></strong>
            </div>
            <button type="button" id="btn-logout">⎋ Salir</button>
        </div>
    </header>

    <div class="section">
        <div class="slots-top">
            <div class="section-title">🚗 Espacios de estacionamiento</div>
            <div style="display:flex;align-items:center;gap:12px">
                <div class="pills" id="pills"></div>
                <button type="button" id="btn-refresh">↻ Actualizar</button>
            </div>
        </div>
        <div class="grid" id="slots-grid"></div>
    </div>
</div>

<div id="toast"></div>

<script src="dashboard.js"></script>
</body>
</html>
